name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore AlgoTradeForge.slnx

      - name: Build
        run: dotnet build AlgoTradeForge.slnx --no-restore --configuration Release

      - name: Test
        run: >-
          dotnet test AlgoTradeForge.slnx
          --no-build
          --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --filter "FullyQualifiedName!~PlaywrightTests"
